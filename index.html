<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ربط المحافظ الذكية</title>
    
    <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.10.1/dist/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            border: 1px solid #334155;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-connect {
            background: var(--primary);
            color: white;
        }

        .btn-connect:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .btn-copy {
            background: #334155;
            color: #38bdf8;
            font-size: 14px;
            padding: 8px;
        }

        #result-box {
            margin-top: 25px;
            padding: 15px;
            background: #0f172a;
            border-radius: 12px;
            display: none;
            border: 1px solid #38bdf8;
            animation: fadeIn 0.5s ease;
        }

        .address-text {
            word-break: break-all;
            font-family: monospace;
            color: var(--success);
            margin-bottom: 10px;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #38bdf8;">ربط المحفظة</h2>
        <p style="color: var(--text-muted);">اتصل بمحفظتك لإظهار العنوان وتأكيد الهوية</p>
        
        <button id="connectBtn" class="btn-connect">اتصل الآن</button>

        <div id="result-box">
            <small style="color: var(--text-muted);">تم الاتصال بالعنوان:</small>
            <span id="walletAddress" class="address-text"></span>
            <button id="copyBtn" class="btn-copy">نسخ العنوان 📋</button>
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const copyBtn = document.getElementById('copyBtn');
        const resultBox = document.getElementById('result-box');
        const walletAddressDisplay = document.getElementById('walletAddress');

        const projectId = 'cb431b6f6e2a73a72983084a5bd30989'; 

        connectBtn.onclick = async () => {
            connectBtn.innerText = "جاري فتح المحفظة...";
            connectBtn.disabled = true;

            try {
                const provider = await EthereumProvider.EthereumProvider.init({
                    projectId: projectId,
                    showQrModal: true,
                    chains: [1], 
                    metadata: {
                        name: "My App",
                        description: "Wallet Connect Test",
                        url: window.location.origin,
                        icons: ["https://walletconnect.com/walletconnect-logo.png"]
                    }
                });

                await provider.connect();

                const web3Provider = new ethers.providers.Web3Provider(provider);
                const signer = web3Provider.getSigner();
                const address = await signer.getAddress();

                // عرض النتيجة
                walletAddressDisplay.innerText = address;
                resultBox.style.display = "block";
                connectBtn.innerText = "متصل بنجاح ✅";

            } catch (error) {
                console.error(error);
                alert("فشل الاتصال");
                connectBtn.innerText = "حاول مرة أخرى";
                connectBtn.disabled = false;
            }
        };

        // وظيفة النسخ
        copyBtn.onclick = () => {
            const text = walletAddressDisplay.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "تم النسخ! ✅";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            });
        };
    </script>
</body>
</html>
