<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Phone Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-gray-900 p-8 rounded-3xl shadow-2xl border border-gray-800 text-center w-full max-w-sm">
        <h2 class="text-xl font-bold mb-2">بوابة Ethereum</h2>
        <p class="text-gray-400 mb-8 text-sm">اتصل بمحفظتك لعرض العنوان</p>
        
        <button id="connectBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-300 shadow-lg active:scale-95">
            Connect Wallet
        </button>

        <p id="status" class="mt-6 text-xs text-gray-500"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
