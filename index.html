<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Wallet Connect | AppKit</title>
    
    <style>
        /* تنسيقات بسيطة للواجهة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #ccc;
            margin-bottom: 2rem;
        }

        /* تخصيص مظهر زر AppKit (اختياري) */
        appkit-button {
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>منصة الربط الذكي</h1>
        <p>قم بربط محفظة MetaMask أو Trust Wallet للبدء</p>
        
        <appkit-button></appkit-button>
    </div>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers'
        import { mainnet, bsc, polygon } from 'https://esm.sh/@reown/appkit/networks'

        // 1. معرف المشروع الخاص بك
        const projectId = 'Cb431b6f6e2a73a72983084a5bd30989';

        // 2. إعداد بيانات تعريف التطبيق
        const metadata = {
            name: 'Web3 App',
            description: 'Connect to your favorite wallets',
            url: window.location.origin, 
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        }

        // 3. إنشاء كائن AppKit وتفعيله
        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [mainnet, bsc, polygon],
            metadata,
            projectId,
            features: {
                analytics: true, // تتبع الإحصائيات في لوحة التحكم الخاصة بك
                email: false,     // اجعلها true للسماح بالدخول عبر البريد الإلكتروني
                socials: []
            },
            themeMode: 'dark', // 'dark' أو 'light' ليناسب تصميمك
            themeVariables: {
                '--w3m-accent': '#3b82f6', // لون الزر الرئيسي (أزرق)
                '--w3m-border-radius-master': '1px' 
            }
        });

        // رسالة في الكونسول للتأكد من التحميل
        console.log("AppKit initialized with Project ID: " + projectId);
    </script>
</body>
</html>
